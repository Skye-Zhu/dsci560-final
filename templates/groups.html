{% extends "base.html" %}

{% block content %}
<h1>Groups</h1>

<form method="GET" action="{{ url_for('group_list') }}" class="search-form">
    <input type="text" name="q" placeholder="Search groups..." value="{{ keyword }}">
    <button type="submit">Search</button>
</form>

<div class="card-grid">
    {% for group in groups %}
        <div class="card">
            <h3>{{ group.name }}</h3>
            <p>{{ group.description }}</p>

            {% if group.id in user_group_ids %}
                <span class="member-badge">Joined</span>
                <a class="button-link" href="{{ url_for('group_detail', group_id=group.id) }}">Enter</a>
            {% else %}
                <form method="POST" action="{{ url_for('join_group', group_id=group.id) }}">
                    <button type="submit">Join Group</button>
                </form>
            {% endif %}
        </div>
    {% endfor %}
</div>
{% endblock %}
